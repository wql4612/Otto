<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桌面机器人 · 控制面板</title>
<style>
  :root {
    --bg-deep:    #080c12;
    --bg-card:    #10161e;
    --bg-card2:   #151d28;
    --border:     #1e2a3a;
    --border-hi:  #2e3d52;
    --text-dim:   #5a6a80;
    --text-body:  #8fa0b8;
    --text-bright:#d0dae8;
    --amber:      #e8a840;
    --amber-dim:  #c08020;
    --amber-glow: rgba(232,168,64,0.15);
    --teal:       #4ab8a8;
    --teal-glow:  rgba(74,184,168,0.12);
    --green:      #6db860;
    --green-glow: rgba(109,184,96,0.15);
    --red:        #e05555;
    --red-glow:   rgba(224,85,85,0.12);
    --radius:     10px;
    --radius-sm:  6px;
    --font-ui:    "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", system-ui, sans-serif;
    --font-mono:  "Cascadia Code", "Fira Code", "Consolas", "Courier New", monospace;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg-deep);
    color: var(--text-body);
    font-family: var(--font-ui);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 30% 20%, rgba(232,168,64,0.03) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 80%, rgba(74,184,168,0.03) 0%, transparent 60%),
      linear-gradient(rgba(30,42,58,0.12) 1px, transparent 1px),
      linear-gradient(90deg, rgba(30,42,58,0.12) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 32px 32px, 32px 32px;
    background-position: 0 0, 0 0, 0 0, 0 0;
    padding-bottom: 32px;
  }

  /* ─────────────────── Header ─────────────────── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    background: rgba(16,22,30,0.85);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 100;
  }
  .header-brand {
    display: flex; align-items: center; gap: 12px;
  }
  .header-icon {
    width: 40px; height: 40px;
    border-radius: var(--radius-sm);
    background: linear-gradient(135deg, var(--amber-dim), var(--amber));
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 0 20px var(--amber-glow);
  }
  .header-icon svg { width: 24px; height: 24px; }
  .header-title {
    font-size: 18px; font-weight: 700; color: var(--text-bright);
    letter-spacing: 0.5px;
  }
  .header-subtitle {
    font-size: 11px; color: var(--text-dim); font-family: var(--font-mono);
    letter-spacing: 1px; text-transform: uppercase;
  }
  .header-status {
    display: flex; align-items: center; gap: 18px;
  }
  .ws-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--red); transition: background 0.4s;
  }
  .ws-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .ws-label { font-size: 11px; color: var(--text-dim); font-family: var(--font-mono); }
  .time-display { font-size: 13px; color: var(--text-body); font-family: var(--font-mono); }

  /* ─────────────────── Layout ─────────────────── */
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 360px;
    grid-template-rows: auto auto;
    gap: 16px;
    padding: 16px 24px;
    max-width: 1320px;
    margin: 0 auto;
  }
  .camera-section { grid-row: 1 / 3; }
  .status-section  { grid-row: 1; }
  .control-section { grid-row: 2; }

  /* ─────────────────── Card ─────────────────── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    position: relative;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
    opacity: 0.6;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 12px; font-weight: 600; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 1.5px;
    font-family: var(--font-mono);
  }
  .card-badge {
    font-size: 10px; font-family: var(--font-mono);
    padding: 3px 8px; border-radius: 20px;
    background: var(--bg-card2); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .card-badge.active { color: var(--amber); border-color: var(--amber-dim); }

  /* ─────────────────── Camera Section ─────────────────── */
  .camera-card { padding: 0; display: flex; flex-direction: column; }
  .camera-frame {
    position: relative;
    background: #000;
    border-radius: var(--radius) var(--radius) 0 0;
    overflow: hidden;
    aspect-ratio: 4/3;
    display: flex; align-items: center; justify-content: center;
  }
  .camera-frame img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .camera-overlay {
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    box-shadow: inset 0 0 60px rgba(0,0,0,0.5), inset 0 0 4px rgba(232,168,64,0.08);
  }
  .camera-corners { position: absolute; inset: 8px; pointer-events: none; }
  .camera-corners::before, .camera-corners::after {
    content: ''; position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(232,168,64,0.3); border-style: solid;
  }
  .camera-corners::before {
    top: 0; left: 0;
    border-width: 2px 0 0 2px;
    border-radius: 2px 0 0 0;
  }
  .camera-corners::after {
    top: 0; right: 0;
    border-width: 2px 2px 0 0;
    border-radius: 0 2px 0 0;
  }
  .camera-bot-corners {
    position: absolute; inset: 8px; pointer-events: none;
  }
  .camera-bot-corners::before, .camera-bot-corners::after {
    content: ''; position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(232,168,64,0.3); border-style: solid;
  }
  .camera-bot-corners::before {
    bottom: 0; left: 0;
    border-width: 0 0 2px 2px;
    border-radius: 0 0 0 2px;
  }
  .camera-bot-corners::after {
    bottom: 0; right: 0;
    border-width: 0 2px 2px 0;
    border-radius: 0 0 2px 0;
  }
  .camera-label {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    font-size: 10px; font-family: var(--font-mono); color: rgba(255,255,255,0.4);
    letter-spacing: 2px; text-transform: uppercase;
    background: rgba(0,0,0,0.6); padding: 2px 10px; border-radius: 20px;
  }
  .camera-offline {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
    background: rgba(0,0,0,0.85);
  }
  .camera-offline svg { width: 48px; height: 48px; opacity: 0.3; }
  .camera-offline span { font-size: 13px; color: var(--text-dim); font-family: var(--font-mono); }
  .camera-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--bg-card2);
    border-radius: 0 0 var(--radius) var(--radius);
  }
  .camera-footer > span {
    font-size: 10px; font-family: var(--font-mono); color: var(--text-dim);
    letter-spacing: 1px;
  }
  .fps-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: fps-pulse 1s infinite;
    display: inline-block; margin-right: 6px;
  }
  @keyframes fps-pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  /* ─────────────────── Person Detection ─────────────────── */
  .person-card {
    display: flex; flex-direction: column; gap: 16px;
  }
  .person-indicator {
    display: flex; align-items: center; gap: 12px;
    padding: 14px;
    border-radius: var(--radius-sm);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    transition: all 0.5s;
  }
  .person-indicator.active {
    border-color: rgba(109,184,96,0.4);
    background: rgba(109,184,96,0.05);
  }
  .person-dot-outer {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: rgba(224,85,85,0.08);
    transition: all 0.6s;
  }
  .person-indicator.active .person-dot-outer {
    background: var(--green-glow);
  }
  .person-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--red);
    transition: all 0.6s;
    position: relative;
  }
  .person-indicator.active .person-dot {
    background: var(--green);
    box-shadow: 0 0 16px rgba(109,184,96,0.6);
    animation: person-pulse 2s ease-in-out infinite;
  }
  @keyframes person-pulse {
    0%,100% { box-shadow: 0 0 12px rgba(109,184,96,0.4); }
    50%     { box-shadow: 0 0 28px rgba(109,184,96,0.8); }
  }
  .person-ripple {
    position: absolute; inset: -8px; border-radius: 50%;
    border: 1px solid rgba(109,184,96,0.3);
    animation: ripple-out 2s ease-out infinite;
    opacity: 0;
  }
  .person-indicator.active .person-ripple { display: block; }
  .person-indicator:not(.active) .person-ripple { display: none; }
  @keyframes ripple-out {
    0%   { transform: scale(1); opacity: 0.8; }
    100% { transform: scale(2.2); opacity: 0; }
  }
  .person-info h3 {
    font-size: 15px; font-weight: 600; color: var(--text-bright);
    margin-bottom: 2px;
  }
  .person-info p {
    font-size: 11px; color: var(--text-dim); font-family: var(--font-mono);
  }

  /* ─────────────────── Device Status ─────────────────── */
  .device-list { display: flex; flex-direction: column; gap: 8px; }
  .device-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    background: var(--bg-card2);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .device-row.on { border-color: rgba(232,168,64,0.25); }
  .device-left { display: flex; align-items: center; gap: 10px; }
  .device-icon {
    width: 34px; height: 34px;
    border-radius: var(--radius-sm);
    display: flex; align-items: center; justify-content: center;
    background: var(--bg-card);
    border: 1px solid var(--border);
    transition: all 0.3s;
  }
  .device-row.on .device-icon {
    background: var(--amber-glow);
    border-color: rgba(232,168,64,0.3);
  }
  .device-icon svg { width: 18px; height: 18px; opacity: 0.5; transition: opacity 0.3s; }
  .device-row.on .device-icon svg { opacity: 1; }
  .device-name { font-size: 13px; color: var(--text-body); font-weight: 500; }
  .device-row.on .device-name { color: var(--text-bright); }
  .device-status-dot {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 700; font-family: var(--font-mono);
    transition: all 0.4s;
    background: var(--bg-card); color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .device-row.on .device-status-dot {
    background: var(--amber-dim);
    color: var(--bg-deep);
    border-color: var(--amber);
    box-shadow: 0 0 12px var(--amber-glow);
  }

  /* ─────────────────── Controls ─────────────────── */
  .ctrl-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .ctrl-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg-card2);
    color: var(--text-body);
    font-family: var(--font-ui);
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .ctrl-btn:hover {
    border-color: var(--border-hi);
    background: var(--bg-card);
  }
  .ctrl-btn:active {
    transform: scale(0.97);
    transition: transform 0.08s;
  }
  .ctrl-btn.active {
    border-color: var(--amber);
    background: var(--amber-glow);
    color: var(--amber);
  }
  .ctrl-btn svg { width: 16px; height: 16px; opacity: 0.6; transition: opacity 0.2s; }
  .ctrl-btn:hover svg, .ctrl-btn.active svg { opacity: 1; }
  .ctrl-btn.scene {
    grid-column: span 2;
    font-size: 12px;
    letter-spacing: 0.5px;
  }
  .ctrl-btn.scene.home {
    background: linear-gradient(135deg, rgba(232,168,64,0.08), rgba(232,168,64,0.02));
  }
  .ctrl-btn.scene.away {
    background: linear-gradient(135deg, rgba(74,184,168,0.08), rgba(74,184,168,0.02));
  }
  .ctrl-btn.scene:hover.home { border-color: var(--amber); }
  .ctrl-btn.scene:hover.away { border-color: var(--teal); }

  /* ─────────────────── Log Section ─────────────────── */
  .log-section {
    padding: 16px 24px;
    max-width: 1320px;
    margin: 0 auto;
  }
  .log-list {
    max-height: 200px;
    overflow-y: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.8;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .log-list::-webkit-scrollbar { width: 4px; }
  .log-list::-webkit-scrollbar-track { background: transparent; }
  .log-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .log-entry {
    display: flex; gap: 12px;
    padding: 3px 0;
    border-bottom: 1px solid rgba(30,42,58,0.3);
  }
  .log-time {
    color: var(--text-dim); flex-shrink: 0; font-size: 10px;
    min-width: 48px;
  }
  .log-msg { color: var(--text-body); }
  .log-entry.detect .log-msg { color: var(--green); }
  .log-entry.command .log-msg { color: var(--amber); }
  .log-entry.system .log-msg  { color: var(--teal); }

  /* ─────────────────── Responsive ─────────────────── */
  @media (max-width: 820px) {
    .main-grid {
      grid-template-columns: 1fr;
      padding: 12px 16px;
    }
    .camera-section { grid-row: auto; }
    .camera-frame { aspect-ratio: 4/3; }
    .status-section, .control-section { grid-row: auto; }
    .header { padding: 12px 16px; }
    .header-title { font-size: 15px; }
    .log-section { padding: 12px 16px; }
  }
  @media (min-width: 821px) and (max-width: 1100px) {
    .main-grid { grid-template-columns: 1fr 300px; }
  }
</style>
</head>
<body>

<!-- ─────────────────── Header ─────────────────── -->
<header class="header">
  <div class="header-brand">
    <div class="header-icon">
      <svg viewBox="0 0 24 24" fill="none">
        <circle cx="12" cy="8" r="4" fill="#080c12" stroke="#080c12" stroke-width="1.5"/>
        <rect x="2" y="14" width="8" height="6" rx="2" fill="#080c12"/>
        <rect x="14" y="14" width="8" height="6" rx="2" fill="#080c12"/>
        <circle cx="10" cy="8" r="1.5" fill="#e8a840"/>
        <circle cx="14" cy="8" r="1.5" fill="#e8a840"/>
        <path d="M10 10 Q12 12 14 10" stroke="#080c12" stroke-width="0.8" fill="none"/>
      </svg>
    </div>
    <div>
      <div class="header-title">桌面机器人控制台</div>
      <div class="header-subtitle">Desktop Robot · Command Center</div>
    </div>
  </div>
  <div class="header-status">
    <span class="ws-label">WS</span>
    <span class="ws-dot" id="wsDot" title="WebSocket连接状态"></span>
    <span id="clock" class="time-display">--:--:--</span>
  </div>
</header>

<!-- ─────────────────── Main Grid ─────────────────── -->
<div class="main-grid">

  <!-- CAMERA -->
  <div class="card camera-card camera-section">
    <div class="camera-frame" id="cameraFrame">
      <img id="camStream" src="" alt="Camera Stream" style="display:none">
      <div class="camera-overlay"></div>
      <div class="camera-corners"></div>
      <div class="camera-bot-corners"></div>
      <div class="camera-label">LIVE · CAM</div>
      <div class="camera-offline" id="cameraOffline">
        <svg viewBox="0 0 24 24" fill="none" stroke="#5a6a80" stroke-width="1">
          <rect x="2" y="3" width="20" height="16" rx="2"/>
          <circle cx="8.5" cy="8.5" r="2.5"/>
          <path d="M2 15l5-4 3 2.5L14 10l8 6"/>
          <line x1="1" y1="1" x2="23" y2="23" stroke="#e05555" stroke-width="1.5"/>
        </svg>
        <span>等待摄像头连接…</span>
      </div>
    </div>
    <div class="camera-footer">
      <span><span class="fps-dot"></span>MJPEG Stream</span>
      <span id="camStatus" style="color:var(--text-dim)">OFFLINE</span>
    </div>
  </div>

  <!-- STATUS PANEL -->
  <div class="card status-section">
    <div class="card-header">
      <span class="card-title">状态监控</span>
      <span class="card-badge" id="statusBadge">待机</span>
    </div>

    <!-- Person Detection -->
    <div class="person-indicator" id="personIndicator">
      <div class="person-dot-outer">
        <div class="person-dot"><div class="person-ripple"></div></div>
      </div>
      <div class="person-info">
        <h3 id="personLabel">未检测到人</h3>
        <p id="personTime">--</p>
      </div>
    </div>

    <!-- Device List -->
    <div class="device-list" style="margin-top:14px">
      <div class="device-row" id="devLight">
        <div class="device-left">
          <div class="device-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <path d="M12 2v3"/><path d="M12 8v2"/>
              <circle cx="12" cy="15" r="4"/>
              <line x1="12" y1="5" x2="12" y2="5"/>
              <path d="M8 5.5A6.5 6.5 0 0 0 5.5 19"/>
              <path d="M16 5.5A6.5 6.5 0 0 1 18.5 19"/>
            </svg>
          </div>
          <span class="device-name">台灯</span>
        </div>
        <div class="device-status-dot" id="lightDot">关</div>
      </div>

      <div class="device-row" id="devFan">
        <div class="device-left">
          <div class="device-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
              <circle cx="12" cy="12" r="2"/>
              <path d="M12 2v2"/><path d="M12 20v2"/>
              <path d="M4.93 4.93l1.41 1.41"/><path d="M17.66 17.66l1.41 1.41"/>
              <path d="M2 12h2"/><path d="M20 12h2"/>
              <path d="M4.93 19.07l1.41-1.41"/><path d="M17.66 6.34l1.41-1.41"/>
            </svg>
          </div>
          <span class="device-name">风扇</span>
        </div>
        <div class="device-status-dot" id="fanDot">关</div>
      </div>

      <div class="device-row" id="devSpeaker">
        <div class="device-left">
          <div class="device-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M15.54 8.46a5 5 0 010 7.07"/>
              <path d="M19.07 4.93a10 10 0 010 14.14"/>
            </svg>
          </div>
          <span class="device-name">音响</span>
        </div>
        <div class="device-status-dot" id="speakerDot">关</div>
      </div>
    </div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="card control-section">
    <div class="card-header">
      <span class="card-title">设备控制</span>
    </div>
    <div class="ctrl-grid">
      <button class="ctrl-btn" id="btnLight" onclick="toggleDevice('light')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="5"/><path d="M12 2v3"/><path d="M12 19v3"/>
        </svg>
        开/关台灯
      </button>
      <button class="ctrl-btn" id="btnFan" onclick="toggleDevice('fan')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v4"/><path d="M12 18v4"/>
        </svg>
        开/关风扇
      </button>
      <button class="ctrl-btn" id="btnSpeaker" onclick="toggleDevice('speaker')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 010 7.07"/>
        </svg>
        开/关音响
      </button>
      <button class="ctrl-btn scene home" onclick="setScene('home')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="14" height="14">
          <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
          <polyline points="9 21 9 12 15 12 15 21"/>
        </svg>
        回家模式
      </button>
      <button class="ctrl-btn scene away" onclick="setScene('away')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" width="14" height="14">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        离开模式
      </button>
    </div>
  </div>
</div>

<!-- ─────────────────── LOG ─────────────────── -->
<div class="log-section">
  <div class="card">
    <div class="card-header">
      <span class="card-title">事件日志</span>
      <span class="card-badge" id="logCount">0</span>
    </div>
    <div class="log-list" id="logList">
      <div class="log-entry system">
        <span class="log-time">--:--</span>
        <span class="log-msg">系统启动，等待 WebSocket 连接…</span>
      </div>
    </div>
  </div>
</div>

<script>
// ─────────────────── Clock ───────────────────
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    now.toLocaleTimeString('zh-CN', { hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

// ─────────────────── State ───────────────────
const state = {
  person: false, personChanged: 0,
  light: false, fan: false, speaker: false,
  wsConnected: false, cameraOn: false
};

// ─────────────────── WebSocket ───────────────────
let ws = null, reconnectTimer = null;

function connectWS() {
  const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
  const wsUrl = `${protocol}//${location.hostname}/ws`;
  try {
    ws = new WebSocket(wsUrl);
    ws.onopen = () => {
      state.wsConnected = true;
      document.getElementById('wsDot').classList.add('connected');
      addLog('system', 'WebSocket 已连接');
      document.getElementById('statusBadge').textContent = '在线';
      document.getElementById('statusBadge').classList.add('active');
      clearTimeout(reconnectTimer);
    };
    ws.onclose = () => {
      state.wsConnected = false;
      document.getElementById('wsDot').classList.remove('connected');
      document.getElementById('statusBadge').textContent = '断连';
      document.getElementById('statusBadge').classList.remove('active');
      addLog('system', 'WebSocket 断开，3秒后重连…');
      reconnectTimer = setTimeout(connectWS, 3000);
    };
    ws.onerror = () => { ws.close(); };
    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        handleMessage(msg);
      } catch {
        // 非 JSON 消息忽略
      }
    };
  } catch {
    reconnectTimer = setTimeout(connectWS, 3000);
  }
}

function handleMessage(msg) {
  switch (msg.type) {
    case 'status':
      if (msg.person !== undefined) updatePerson(msg.person);
      if (msg.light !== undefined) updateDevice('light', msg.light);
      if (msg.fan !== undefined) updateDevice('fan', msg.fan);
      if (msg.speaker !== undefined) updateDevice('speaker', msg.speaker);
      break;
    case 'log':
      addLog(msg.category || 'system', msg.message, msg.time);
      break;
    case 'camera':
      if (msg.on) {
        state.cameraOn = true;
        document.getElementById('camStream').style.display = 'block';
        document.getElementById('camStream').src = '/stream';
        document.getElementById('cameraOffline').style.display = 'none';
        document.getElementById('camStatus').textContent = 'LIVE';
        document.getElementById('camStatus').style.color = '#6db860';
      } else {
        state.cameraOn = false;
        document.getElementById('camStream').style.display = 'none';
        document.getElementById('cameraOffline').style.display = 'flex';
        document.getElementById('camStatus').textContent = 'OFFLINE';
        document.getElementById('camStatus').style.color = 'var(--text-dim)';
      }
      break;
  }
}

// ─────────────────── Person ───────────────────
function updatePerson(present) {
  if (state.person !== present) {
    state.person = present;
    state.personChanged = Date.now();
    const indicator = document.getElementById('personIndicator');
    const label = document.getElementById('personLabel');
    const time = document.getElementById('personTime');
    const now = new Date().toLocaleTimeString('zh-CN', { hour12: false });

    if (present) {
      indicator.classList.add('active');
      label.textContent = '检测到人';
      time.textContent = '进入 · ' + now;
      addLog('detect', '检测到人进入 → 自动开灯');
    } else {
      indicator.classList.remove('active');
      label.textContent = '未检测到人';
      time.textContent = '离开 · ' + now;
      addLog('detect', '人已离开 → 延时关灯');
    }
  }
}

// ─────────────────── Device ───────────────────
function updateDevice(dev, on) {
  if (state[dev] === on) return;
  state[dev] = on;
  const names = { light: '台灯', fan: '风扇', speaker: '音响' };
  const devIds = { light: 'devLight', fan: 'devFan', speaker: 'devSpeaker' };
  const dotIds = { light: 'lightDot', fan: 'fanDot', speaker: 'speakerDot' };
  const btnIds = { light: 'btnLight', fan: 'btnFan', speaker: 'btnSpeaker' };

  const row = document.getElementById(devIds[dev]);
  const dot = document.getElementById(dotIds[dev]);
  const btn = document.getElementById(btnIds[dev]);

  if (on) {
    row.classList.add('on');
    dot.textContent = '开';
    btn.classList.add('active');
  } else {
    row.classList.remove('on');
    dot.textContent = '关';
    btn.classList.remove('active');
  }
  addLog(on ? 'command' : 'system', `${names[dev]} · ${on ? '开启' : '关闭'}`);
}

function toggleDevice(dev) {
  if (!state.wsConnected) {
    addLog('system', '⚠ 未连接 ESP32，无法发送指令');
    return;
  }
  const newState = !state[dev];
  ws.send(JSON.stringify({ type: 'cmd', device: dev, action: newState ? 'on' : 'off' }));
  // 乐观更新
  updateDevice(dev, newState);
}

function setScene(scene) {
  if (!state.wsConnected) {
    addLog('system', '⚠ 未连接 ESP32，无法发送指令');
    return;
  }
  ws.send(JSON.stringify({ type: 'scene', name: scene }));
  addLog('command', `🏠 执行场景模式: ${scene === 'home' ? '回家' : '离开'}`);
}

// ─────────────────── Log ───────────────────
function addLog(category, message, timeStr) {
  const container = document.getElementById('logList');
  const time = timeStr || new Date().toLocaleTimeString('zh-CN', { hour12: false });
  const entry = document.createElement('div');
  entry.className = `log-entry ${category}`;
  entry.innerHTML = `<span class="log-time">${time}</span><span class="log-msg">${message}</span>`;
  container.appendChild(entry);

  // 限制日志条数
  const entries = container.querySelectorAll('.log-entry');
  if (entries.length > 200) entries[0].remove();

  // 自动滚底
  container.scrollTop = container.scrollHeight;

  // 更新计数
  document.getElementById('logCount').textContent = entries.length;
}

// ─────────────────── Init ───────────────────
connectWS();

// 尝试自动加载摄像头流（如果 ESP32 已启动）
setTimeout(() => {
  document.getElementById('camStream').src = '/stream';
  document.getElementById('camStream').onload = () => {
    document.getElementById('camStream').style.display = 'block';
    document.getElementById('cameraOffline').style.display = 'none';
    document.getElementById('camStatus').textContent = 'LIVE';
    document.getElementById('camStatus').style.color = '#6db860';
    state.cameraOn = true;
  };
  document.getElementById('camStream').onerror = () => {
    // 摄像头未就绪，保持离线状态
  };
}, 1500);
</script>
</body>
</html>
